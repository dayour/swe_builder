# Pattern: Escalation / Graceful Decline
# Trigger: OnRecognizedIntent
# Shows: Recognize out-of-scope request → decline gracefully → offer alternatives
# Use for boundary DECLINE and REFUSE scenarios

kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Escalate to Human
    triggerQueries:
      - talk to a person
      - speak to someone
      - human agent
      - transfer me
      - I need help from a real person
  actions:
    - kind: SendMessage
      id: acknowledgeEscalation
      message: I understand you'd like to speak with someone directly. Let me connect you.

    - kind: BeginDialog
      id: redirectToEscalate
      dialog: crf5a_escalate

