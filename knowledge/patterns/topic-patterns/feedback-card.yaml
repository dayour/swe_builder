# --- Integration notes ---
# To log feedback: send Topic.feedbackResponse + Topic.detailedFeedback to a
# Power Automate flow that writes to Dataverse, SharePoint, or Application Insights.
# The feedback data includes: reason (category), details (free text), and the
# original query context if using Option B.
