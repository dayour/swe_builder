# Pattern: Disambiguation (Multiple Topics Matched)
# Trigger: OnSelectIntent (fires when multiple topics match the user's message)
# Shows: Present matched topics as a choice list, let user pick, handle "none of these".
# When to use: Agent has multiple topics with overlapping trigger phrases.
# System variables:
#   System.Recognizer.IntentOptions — array of matched topics
#   System.Recognizer.SelectedIntent — user's choice
# Note: triggerBehavior: Always ensures this topic fires every time multiple matches occur.

kind: AdaptiveDialog
beginDialog:
  kind: OnSelectIntent
  id: main
  triggerBehavior: Always
  actions:
    # Step 1: Capture matched topics
    - kind: SetVariable
      id: setIntentOptions_REPLACE1
      variable: init:Topic.IntentOptions
      value: =System.Recognizer.IntentOptions

    # Step 2: Add "None of these" option
    - kind: SetTextVariable
      id: setNoneLabel_REPLACE2
      variable: Topic.NoneOfTheseDisplayName
      value: None of these

    - kind: EditTable
      id: addNoneOption_REPLACE3
      changeType: Add
      itemsVariable: Topic.IntentOptions
      value: "={ DisplayName: Topic.NoneOfTheseDisplayName, TopicId: \"NoTopic\", TriggerId: \"NoTrigger\", Score: 1.0 }"

    # Step 3: Ask user to choose
    - kind: Question
      id: askDisambiguation_REPLACE4
      interruptionPolicy:
        allowInterruption: false
      alwaysPrompt: true
      variable: System.Recognizer.SelectedIntent
      prompt: "To clarify, did you mean:"
      entity:
        kind: DynamicClosedListEntity
        items: =Topic.IntentOptions

    # Step 4: Handle "None of these" selection
    - kind: ConditionGroup
      id: checkNone_REPLACE5
      conditions:
        - id: isNone_REPLACE6
          condition: =System.Recognizer.SelectedIntent.TopicId = "NoTopic"
          actions:
            - kind: ReplaceDialog
              id: goToFallback_REPLACE7
              dialog: "{{SCHEMA_NAME}}.topic.Fallback"

# --- Key properties ---
# OnSelectIntent: fires when the recognizer returns multiple intent matches
# triggerBehavior: Always — fires every time (not just once)
# DynamicClosedListEntity: renders matched topics as a choice list
# ReplaceDialog: navigates to fallback instead of BeginDialog (doesn't return)
# EditTable: adds a row to the matched topics array

# --- Design notes ---
# 1. "None of these" redirect goes to Fallback topic — customize if needed
# 2. The prompt "To clarify, did you mean:" can be customized per agent persona
# 3. allowInterruption: false prevents the user from triggering another topic
#    mid-disambiguation (which would restart the loop)
# 4. This replaces the system default disambiguation which just picks the top match
