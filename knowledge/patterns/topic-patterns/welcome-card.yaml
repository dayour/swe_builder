# --- Channel compatibility ---
# Teams: Full support. Action.Submit with msteams.imBack sends text as if user typed it.
# Web Chat: Action.Submit works. No msteams wrapper needed (agent receives data object).
# M365 Copilot: Adaptive cards rendered. Action buttons work.
# Mobile Teams: Full support, buttons stack vertically on small screens.
# WhatsApp: Very limited — falls back to text. Use suggestedActions instead.
