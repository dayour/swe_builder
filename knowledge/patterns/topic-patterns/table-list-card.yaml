# Pattern: Table / List Display Card
# Trigger: OnRecognizedIntent (or mid-topic after data fetch)
# Shows: Display tabular data or item lists from API/connector results
# Common in: search results, order history, inventory, ticket lists
#
# Schema: 1.5 (Table element requires 1.5+)
# Actions: Action.Submit for row selection, Action.OpenUrl for links
# Channels: Teams, Web Chat, M365 Copilot, Omnichannel
# WhatsApp: Not supported — falls back to plain text

kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: "{{TOPIC_NAME}}"
    triggerQueries:
      - "{{TRIGGER_1}}"
      - "{{TRIGGER_2}}"
  actions:
    # Assumes Topic.items is populated by a prior step (connector, HTTP, flow)

    # Option A: Table element (v1.5+ — structured rows/columns)
    - kind: SendMessage
      id: sendTableCard
      message:
        text: "Here are the results:"
        attachments:
          - kind: AdaptiveCardTemplate
            cardContent: |-
              ={
                type: "AdaptiveCard",
                '$schema': "http://adaptivecards.io/schemas/adaptive-card.json",
                version: "1.5",
                body: [
                  {
                    type: "TextBlock",
                    text: "{{TABLE_TITLE}}",
                    weight: "Bolder",
                    size: "Large"
                  },
                  {
                    type: "Table",
                    gridStyle: "accent",
                    firstRowAsHeader: true,
                    showGridLines: true,
                    columns: [
                      { width: 2 },
                      { width: 1 },
                      { width: 1 }
                    ],
                    rows: [
                      {
                        type: "TableRow",
                        style: "accent",
                        cells: [
                          { type: "TableCell", items: [{ type: "TextBlock", text: "{{COL_1_HEADER}}", weight: "Bolder" }] },
                          { type: "TableCell", items: [{ type: "TextBlock", text: "{{COL_2_HEADER}}", weight: "Bolder" }] },
                          { type: "TableCell", items: [{ type: "TextBlock", text: "{{COL_3_HEADER}}", weight: "Bolder" }] }
                        ]
                      }
                    ]
                  },
                  {
                    type: "TextBlock",
                    text: "{{FOOTER_TEXT}}",
                    size: "Small",
                    isSubtle: true,
                    spacing: "Medium"
                  }
                ]
              }

