#           actions:
#             - title: {{BUTTON_1_LABEL}}
#               type: imBack
#               value: {{BUTTON_1_TEXT}}
#             - title: {{BUTTON_2_LABEL}}
#               type: imBack
#               value: {{BUTTON_2_TEXT}}

# --- Variant C: Auto-redirect (RECOMMENDED for dashboard/checklist agents) ---
kind: AdaptiveDialog
beginDialog:
  kind: OnConversationStart
  id: main
  actions:
    - kind: SendActivity
      id: sendWelcome
      activity:
        text:
          - "Welcome! Loading your dashboard..."
    - kind: BeginDialog
      id: autoRedirect
      dialog: "{{TARGET_TOPIC_SCHEMA}}"
