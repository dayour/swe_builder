# Pattern: Conversation Start / Greeting
# Trigger: OnConversationStart (fires automatically when user opens chat)
# Variants:
#   A) Simple greeting (message only)
#   B) Greeting with suggested actions (one-click buttons)
#   C) Auto-redirect to another topic (no user input needed)
# Customize: Replace {{PLACEHOLDERS}} with your values

