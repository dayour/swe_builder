# Pattern: Confirmation Card (Review Before Action)
# Trigger: Used mid-topic after collecting data
# Shows: Summary of collected data → Confirm or Edit → proceed with action
# Common in: order placement, booking, profile updates, ticket submission
#
# Schema: 1.5 (cross-channel safe)
# Actions: Action.Submit only
# Channels: Teams, Web Chat, M365 Copilot, Omnichannel

kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: "{{TOPIC_NAME}}"
    triggerQueries:
      - "{{TRIGGER_1}}"
      - "{{TRIGGER_2}}"
  actions:
    # Steps 1-N: Collect data (questions, forms, API lookups)
    # ... (your data collection steps here)

    # Confirmation step: Show summary and ask to confirm
    - kind: Question
      id: confirmAction
      interruptionPolicy:
        allowInterruption: false
      variable: init:Topic.confirmation
      prompt:
        text: "Please review the details below:"
        attachments:
          - kind: AdaptiveCardTemplate
            cardContent: |-
              ={
                type: "AdaptiveCard",
                '$schema': "http://adaptivecards.io/schemas/adaptive-card.json",
                version: "1.5",
                body: [
                  {
                    type: "TextBlock",
                    text: "Please Confirm",
                    weight: "Bolder",
                    size: "Large"
                  },
                  {
                    type: "TextBlock",
                    text: "Review the details below before proceeding:",
                    wrap: true,
                    isSubtle: true
                  },
                  {
                    type: "FactSet",
                    facts: [
                      { title: "{{FIELD_1_LABEL}}", value: Topic.field1 },
                      { title: "{{FIELD_2_LABEL}}", value: Topic.field2 },
                      { title: "{{FIELD_3_LABEL}}", value: Topic.field3 },
                      { title: "{{FIELD_4_LABEL}}", value: Topic.field4 }
                    ]
                  },
                  {
                    type: "Input.Toggle",
                    id: "confirmed",
                    title: "I confirm the above details are correct",
                    value: "false",
                    valueOn: "true",
                    valueOff: "false"
                  }
                ],
                actions: [
                  {
                    type: "Action.Submit",
                    title: "Confirm & Submit",
                    style: "positive"
                  },
                  {
                    type: "Action.Submit",
                    title: "Cancel",
                    data: { confirmed: "cancel" }
                  }
                ]
              }
      entity: StringPrebuiltEntity

    # Route: confirmed vs cancelled
    - kind: ConditionGroup
      id: routeConfirmation
      conditions:
        - id: confirmed
          condition: =Topic.confirmation.confirmed = "true"
          actions:
            - kind: SendMessage
              id: sendConfirmed
              message: "Confirmed. Processing your request..."
            # Execute the action (connector, flow, HTTP, etc.)

        - id: cancelled
          condition: =Topic.confirmation.confirmed = "cancel" || Topic.confirmation.confirmed = "false"
          actions:
            - kind: SendMessage
              id: sendCancelled
              message: "Cancelled. No changes were made. Would you like to start over?"

