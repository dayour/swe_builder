# Pattern: Connector Action (TaskDialog)
# Kind: TaskDialog (not AdaptiveDialog — this is an action, not a topic)
# Shows: Define a connector action that the orchestrator can invoke as a tool.
# When to use: Integrate with external services via Power Platform connectors
#              (Teams, Outlook, SharePoint, Planner, Dataverse, custom connectors).
# Note: Connection references can ONLY be created through the Copilot Studio UI.
#       After adding the action in the UI and pulling locally, use this pattern to
#       customize inputs, descriptions, and connection mode.

# --- Connector Action Definition ---
kind: TaskDialog
modelDisplayName: "{{ACTION_DISPLAY_NAME}}"
modelDescription: "{{ACTION_DESCRIPTION_FOR_ORCHESTRATOR}}"
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent: {}
  actions:
    - kind: InvokeConnectorTaskAction
      id: invokeAction_REPLACE1
      connectionReference: "{{CONNECTION_REFERENCE_LOGICAL_NAME}}"
      connectionProperties:
        kind: ConnectionReferenceBySchema
        connectionReferenceSchemaName: "{{CONNECTION_REF_SCHEMA_NAME}}"
      operationId: "{{OPERATION_ID}}"
      input:
        # ManualTaskInput: fixed values (strings only)
        # AutomaticTaskInput: AI-provided from user context
        parameters/param1: "{{FIXED_VALUE}}"
      output:
        statusCode: Topic.StatusCode
        body: Topic.ResponseBody

# --- Input Types ---
# ManualTaskInput: value is a fixed string (not user-provided)
#   - Use for: static IDs, fixed channel names, constant values
#   - Values are ALWAYS strings — even numbers must be quoted
#
# AutomaticTaskInput: orchestrator collects from user or extracts from context
#   - Use for: dynamic values the user provides
#   - shouldPromptUser: true = ask user if missing
#   - shouldPromptUser: false = extract silently from context

inputs:
  - kind: ManualTaskInput
    propertyName: param1
    value: "{{FIXED_VALUE}}"
  - kind: AutomaticTaskInput
    propertyName: param2
    description: "{{PARAM2_DESCRIPTION}}"
    shouldPromptUser: true

inputType:
  properties:
    param2:
      displayName: param2
      description: "{{PARAM2_DESCRIPTION}}"
      type: String

outputType:
  properties:
    StatusCode:
      displayName: StatusCode
      description: HTTP status code of the connector call
      type: Number

# --- Key rules ---
# 1. NEVER change operationId or connectionReference after creation
# 2. modelDescription is critical for orchestrator routing — write it clearly
# 3. ManualTaskInput values are STRINGS ONLY (no numbers, no expressions)
# 4. Connection references must be created in Copilot Studio UI first
# 5. After adding in UI, pull locally, then customize this YAML

# --- Connector lookup ---
# Use connector-lookup to find the right operation before adding in UI:
#   node scripts/connector-lookup.bundle.js search "send teams message"
#   node scripts/connector-lookup.bundle.js operations shared_teams
#   node scripts/connector-lookup.bundle.js operation shared_teams PostMessageToConversation
