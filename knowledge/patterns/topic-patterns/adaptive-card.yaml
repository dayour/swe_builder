# Pattern: Display Data in Adaptive Card
# Trigger: OnRecognizedIntent
# Shows: Collect input → SetVariable → SendMessage with AdaptiveCardTemplate
# The cardContent uses PowerFx (= prefix) so variables can be embedded

kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: "{{TOPIC_NAME}}"
    triggerQueries:
      - "{{TRIGGER_1}}"
      - "{{TRIGGER_2}}"
  actions:
    - kind: SendMessage
      id: sendDataCard
      message:
        text: "Here's what I found:"
        attachments:
          - kind: AdaptiveCardTemplate
            cardContent: |-
              ={
                type: "AdaptiveCard",
                '$schema': "http://adaptivecards.io/schemas/adaptive-card.json",
                version: "1.5",
                body: [
                  {
                    type: "TextBlock",
                    text: "{{CARD_TITLE}}",
                    weight: "Bolder",
                    size: "Large"
                  },
                  {
                    type: "FactSet",
                    facts: [
                      { title: "{{FACT_1_LABEL}}", value: "{{FACT_1_VALUE}}" },
                      { title: "{{FACT_2_LABEL}}", value: "{{FACT_2_VALUE}}" },
                      { title: "{{FACT_3_LABEL}}", value: "{{FACT_3_VALUE}}" }
                    ]
                  },
                  {
                    type: "TextBlock",
                    text: "{{CARD_FOOTER}}",
                    size: "Small",
                    isSubtle: true,
                    wrap: true
                  }
                ]
              }

