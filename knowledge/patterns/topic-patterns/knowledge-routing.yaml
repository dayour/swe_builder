# Pattern: Custom Knowledge Routing via OnKnowledgeRequested
# Trigger: OnKnowledgeRequested (YAML-only — no UI designer)
# Shows: Intercept UniversalSearchTool to route knowledge searches by category.
#         Uses orchestrator-generated classification (AutomaticTaskInput with
#         shouldPromptUser: false) to determine which knowledge source to search.
# When to use: Agent has >25 knowledge sources (orchestrator can only auto-select 25),
#              or you need category-based routing (HR/IT/Finance) for accuracy,
#              or you need to bring in external data sources (SharePoint Lists, REST APIs).
# System variables (ONLY available in OnKnowledgeRequested topics):
#   System.SearchQuery — orchestrator's reformulated query (semantic/vector search)
#   System.KeywordSearchQuery — keyword-extracted version (lexical/keyword search)
#   System.SearchResults — output: write {snippet, title, url} records here
# Prerequisites:
#   - Knowledge sources must have triggerCondition: =false to prevent auto-search
#   - A separate topic with AutomaticTaskInput sets Global.searchCategory
# Note: triggerCondition on knowledge source files CANNOT dynamically reference
#       runtime global variables — routing must be done HERE via ConditionGroup.

# --- Step 0: Classification Topic (separate file) ---
# A separate topic uses AutomaticTaskInput to classify the query and set
# Global.searchCategory. See orchestrator-variable.yaml for the full pattern.
# The classification reuses the orchestrator's existing LLM call — zero extra cost.

# --- Step 1: OnKnowledgeRequested Routing Topic ---
kind: AdaptiveDialog
beginDialog:
  kind: OnKnowledgeRequested
  id: main
  actions:
    - kind: ConditionGroup
      id: routeByCategory
      conditions:
        - id: routeHR
          condition: =Global.searchCategory = "HR"
          actions:
            - kind: SearchAndSummarizeContent
              id: searchHR
              autoSend: false
              variable: System.SearchResults
              userInput: =System.SearchQuery
              knowledgeSources:
                kind: SearchSpecificKnowledgeSources
                knowledgeSources:
                  - "{{SCHEMA_NAME}}.knowledge.hr-policies"
              applyModelKnowledgeSetting: false

        - id: routeIT
          condition: =Global.searchCategory = "IT"
          actions:
            - kind: SearchAndSummarizeContent
              id: searchIT
              autoSend: false
              variable: System.SearchResults
              userInput: =System.SearchQuery
              knowledgeSources:
                kind: SearchSpecificKnowledgeSources
                knowledgeSources:
                  - "{{SCHEMA_NAME}}.knowledge.it-documentation"
              applyModelKnowledgeSetting: false

        - id: routeFinance
          condition: =Global.searchCategory = "Finance"
          actions:
            - kind: SearchAndSummarizeContent
              id: searchFinance
              autoSend: false
              variable: System.SearchResults
              userInput: =System.SearchQuery
              knowledgeSources:
                kind: SearchSpecificKnowledgeSources
                knowledgeSources:
                  - "{{SCHEMA_NAME}}.knowledge.finance-docs"
              applyModelKnowledgeSetting: false

      elseActions:
        # Fallback: search all knowledge sources for unrecognized categories
        - kind: SearchAndSummarizeContent
          id: searchAll
          autoSend: false
          variable: System.SearchResults
          userInput: =System.SearchQuery

