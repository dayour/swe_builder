# --- Variant: External Data Sources (SharePoint Lists, REST APIs) ---
# OnKnowledgeRequested can bring in data the UniversalSearchTool can't reach natively.
# Transform results into the required {snippet, title, url} schema:
#
# - kind: InvokeConnectorAction
#   id: querySharePointList
#   connectionReference: shared_sharepointonline
#   connectionProperties:
#     kind: ConnectionReferenceBySchema
#     connectionReferenceSchemaName: {{CONNECTION_REF_SCHEMA}}
#   operationId: GetItems
#   input:
#     parameters/dataset: https://contoso.sharepoint.com/sites/HR
#     parameters/table: Events
#   output:
#     statusCode: Topic.StatusCode
#     body: Topic.ListItems
#
# - kind: SetVariable
#   id: transformResults
#   variable: System.SearchResults
#   value: "=ForAll(Topic.ListItems.value,
#     {
#       snippet: ThisRecord.Description & \" | Date: \" & Text(ThisRecord.Date, \"yyyy-mm-dd\"),
#       title: ThisRecord.Title,
#       url: \"https://contoso.sharepoint.com/sites/HR/Lists/Events/DispForm.aspx?ID=\" & Text(ThisRecord.ID)
#     }
#   )"

# --- Design notes ---
# 1. OnKnowledgeRequested hooks INTO the UniversalSearchTool — it doesn't replace it
# 2. Results written to System.SearchResults merge with results from standard sources
#    (unless all sources use triggerCondition: =false)
# 3. System.SearchQuery is already context-aware (includes conversation history)
# 4. Classification descriptions should use enum-style vocabularies (3-6 categories max)
# 5. Always include a fallback/elseActions for unrecognized categories
# 6. 25-source limit: if agent has >25 knowledge sources, orchestrator selects top 25
#    by source name + description comment. This routing pattern gives explicit control.
# 7. Query rewriting includes conversation history — System.SearchQuery handles
#    "tell me more about that" correctly without CreateSearchQuery
