name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci --prefix app/frontend

      - name: Lint frontend
        run: npm run lint --prefix app/frontend

      - name: Build frontend
        run: npm run build --prefix app/frontend

      - name: Run frontend tests
        run: npm test --prefix app/frontend

      - name: Verify CLI entry point
        run: node bin/cli.js --help

      - name: Verify npm pack
        run: |
          npm pack --dry-run 2>&1 | head -50
          echo "✓ npm pack dry-run succeeded"
